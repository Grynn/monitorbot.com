<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonitorBot — Coming Soon</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        font-family: "Inter", sans-serif;
        height: 100%;
        background: #0a0a0a;
        color: #e5e5e5;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 560px;
      }
      .logo {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }
      h1 span {
        color: #3b82f6;
      }
      .tagline {
        font-size: 1.15rem;
        color: #a3a3a3;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .badge {
        display: inline-block;
        background: rgba(59, 130, 246, 0.12);
        color: #60a5fa;
        padding: 0.4rem 1rem;
        border-radius: 9999px;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 2.5rem;
      }
      .contact {
        margin-top: 2rem;
        font-size: 0.9rem;
        color: #737373;
      }
      .contact a {
        color: #60a5fa;
        text-decoration: none;
      }
      .contact a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🤖</div>
      <h1>Monitor<span>Bot</span></h1>
      <div class="badge">Coming Soon</div>
      <p class="tagline">
        Intelligent monitoring for what matters.<br />
        We're building something new. Stay tuned.
      </p>
      <p class="contact">
        Contact: <a href="mailto:hello@monitorbot.com">hello@monitorbot.com</a>
      </p>
    </div>
  </body>
</html>
